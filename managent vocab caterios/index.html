<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Caucasian+Albanian&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
  <header>
    <div class="start">
        <p><b>VocabApp</b></p>
        <p>Dashboard</p>
        <p>Categories</p>
        <p>Vocabulary</p>
        <p>Flashcards</p>
        <p>Quiz</p>
    </div>
    
    <button class="logout">Logout</button>

  </header>

   <div class="container">
    
    <div class="modau">
      <h1 class="title">Vocabulary Categories</h1>
      <button id="addBtn" class="btn-add">Add New Category</button>
    </div>

    <input 
      type="text" 
      id="searchInput"
      placeholder="Search categories..." 
      class="search-box">

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>NAME</th>
            <th>DESCRIPTION</th>
            <th>ACTIONS</th>
          </tr>
        </thead>
        <tbody id="render">

        </tbody>
      </table>
    </div>
  </div>




  <!-- popup ADd -->
<div class="modal" id="PopAdd"style="display: none">
    <div class="popup">
      <div class="popup-header">
        <h2 id="modalTitle">Add New Word</h2>
        <span class="close-btn" id="closeBtn">&times;</span>
      </div>
      <div class="popup-body">
        <div class="form-group">
          <label for="wordInput">Name</label>
          <input type="text" id="wordInput">
        </div>
        <div class="form-group">
          <label for="meaningInput">Deripiton</label>
          <input type="text" id="meaningInput" >
        </div>
       
      </div>
      <div class="popup-footer">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-save" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  
 
<!-- popup Delete -->
  <div class="modal" id="popUpDeleteWord" style="display: none">
    <div class="popupDe">
      <div class="popup-header">
        <h2>Delete Word</h2>
        <span class="close-btn" id="closeDeleteBtn">×</span>
      </div>
      <div class="popup-body">
        Are you sure you want to delete this word?
      </div>
      <div class="popup-footer">
        <button class="btn-cancel" id="cancelDelete">Cancel</button>
        <button class="btn-delete-confirm" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>




  <div id="popUpEdit" style="display: none" class="popUpStyle">
        <div class="modal_box">
            <div class="popUpItem">
                <span>Edit Word</span>
                <button id="close_edit" class="btn-close">X</button>
            </div>
            <hr>
            <div class="popUpItem">
                <label for="editInputWord">Word</label>
                <input type="text" id="editInputWord">
            </div>
            <div class="popUpItem">
                <label for="editInputMeaning">Meaning</label>
                <textarea id="editInputMeaning"></textarea>
            </div>
            <div class="popUpItem">
                <label for="editInputCategory">Category</label>
                <input type="text" id="editInputCategory">
            </div>
            <hr>
            <div class="popUpItem">
                <button id="btn_cancelEditWord" class="btn_cancel">Cancel</button>
                <button id="btn_saveEditWord" class="btn_confirmItem">Save</button>
            </div>
        </div>
    </div>



<footer>
     <p>© 2024 VocabApp. All rights reserved</p>
</footer>


    <script src="./script.js"></script>
</body>
</html>
