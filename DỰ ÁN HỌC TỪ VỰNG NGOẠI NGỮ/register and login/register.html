<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Caucasian+Albanian&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<body>
   <div class="start">
    <div class="words">
    <p class="title">Vocabulary</p>

    <div class="TwoButton">
    <button class="blue">Login</button>
    <button class="green">Register</button></div>

</div>

</div>


<form action="">


    <div class="main">
      <h1>Register</h1>

      <div class="formInput">
      <label for="">First Name</label><br><br>
      <input type="text" id="Onename"placeholder="  Nhập First Name"><br>
      <small id="first" class="error"></small><br><br>

      <label for="">Last Name</label><br><br>
      <input type="text" id="Twoname"placeholder="  Nhập Last Name"><br>
      <small id="last" class="error"></small><br><br>

      <label for="">Email</label><br><br>
      <input type="email" id="email"placeholder="  Nhập Email"><br>
      <small id="emailError" class="error"></small><br><br>

      <label for="">Password</label><br><br>
      <input type="password" id="pass"placeholder="  Nhập Password "><br>
       <small id="PassError" class="error"></small><br><br>

      <label for="">Confirm Password</label><br><br>
      <input type="password" id="againPass"placeholder="  Nhập Confirm Password "><br>
      <small id="CoFirmPassError" class="error"></small><br><br>

    </div>
      <button class="register" id="btn-add" >Register</button>
  </div>

</form>


    <script src="./register.js"></script>
</body>
</html>
