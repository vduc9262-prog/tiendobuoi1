<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang quản lý từ vựng trong danh mục</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Caucasian+Albanian&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>


    <header>
    <h2>Vocabulary Words</h2>

    <button class="Add" id="btn-add">Add New Words</button>
</header>

<div class="main">
    <select name="" id=""class="title">
    <option> All Categories</option><br>
    <option value="Con vật">Con vật</option>
    <option value="Cây cối">Cây cối</option>
</select><br>
    <input type="text" placeholder="Search vocabulary...">
</div><br>

 
<table class="vocab-table">
  <thead>
    <tr>
      <th>WORD</th>
      <th>MEANING</th>
      <th>CATEGORY</th>
      <th>ACTIONS</th>
    </tr>
  </thead>
  <tbody id="renderWords">

  </tbody>
</table>

<!-- popup ADd -->
<div class="modal" id="editModal" style="display: none">
    <div class="popup">
      <div class="popup-header">
        <h2 id="modalTitle">Add New Word</h2>
        <span class="close-btn" id="closeBtn">&times;</span>
      </div>
      <div class="popup-body">
        <div class="form-group">
          <label for="wordInput">Word</label>
          <input type="text" id="wordInput">
        </div>
        <div class="form-group">
          <label for="meaningInput">Meaning</label>
          <input type="text" id="meaningInput" >
        </div>
        <div class="form-group">
          <label for="categoryInput">Category</label>
          <input type="text" id="categoryInput">
        </div>
      </div>
      <div class="popup-footer">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-save" id="saveBtn">Save</button>
      </div>
    </div>
  </div>


<!-- popup Delete -->
  <div class="modal" id="deleteModal" style="display: none">
    <div class="popupDe">
      <div class="popup-header">
        <h2>Delete Word</h2>
        <span class="close-btn" id="closeDeleteBtn">×</span>
      </div>
      <div class="popup-body">
        Are you sure you want to delete this word?
      </div>
      <div class="popup-footer">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-delete-confirm" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  




    <script src="./script.js">

    </script>
</body>


 
</html>
